services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      - PLUM_ADDR=:8080
      - PLUM_DB_PATH=/data/plum.db
    volumes:
      - .:/app
      - plum_data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://app:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

volumes:
  plum_data:
