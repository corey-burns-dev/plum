services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      - PLUM_ADDR=:8080
      - PLUM_DB_PATH=/data/plum.db
      # Point the backend at the host TV library, mounted below.
      - PLUM_TV_PATH=/tv
    volumes:
      - .:/app
      - plum_data:/data
      # Mount your host TV library into the container so the Go process
      # can see /home/cburns/Videos. Adjust the left side if you ever
      # move your library.
      - /home/cburns/Videos:/tv:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      # Use the host-mapped backend port so the browser
      # can reach the API directly from your machine.
      - VITE_BACKEND_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

volumes:
  plum_data:
