services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      - PLUM_ADDR=${PLUM_ADDR:-:8080}
      - PLUM_DATABASE_URL=/data/plum.db
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TVDB_API_KEY=${TVDB_API_KEY}
      - OMDB_API_KEY=${OMDB_API_KEY}
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - .:/app
      - plum_data:/data
      # Bind host folders straight to /tv, /movies, /anime, /music — add libraries with those exact paths in Plum
      - /home/cburns/Videos/tv:/tv:ro
      - /home/cburns/Videos/movies:/movies:ro
      - /home/cburns/Videos/anime:/anime:ro
      - /home/cburns/Videos/music:/music:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:8080}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      app:
        condition: service_healthy

volumes:
  plum_data:
